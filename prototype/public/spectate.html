<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Card Battle — Spectator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Datacenter Dark base (ART-DIRECTION §2a) */
    --void:#0B0E14; --surface:#141A23; --edge:#2A323D; --ink:#E6EDF3; --dim:#8B97A6;
    /* functional stat colors (§2b) */
    --perf:#FF5C5C; --rel:#5BD68A; --val:#F4C04C; --cmp:#3DD6F0; --safe:#9FB3C8;
    /* faction hues (§2c) */
    --closedai:#19C37D; --anthrabbit:#A07CFF; --googlitch:#4D8DF0; --shallowseek:#FF8A3D;
    --disp:'Space Grotesk','Archivo',ui-sans-serif,system-ui,sans-serif;
    --body:'Inter',ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
    --mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:
      radial-gradient(120% 80% at 50% -10%, #11161f 0%, var(--void) 55%),
      var(--void);
    color:var(--ink);font:14px/1.45 var(--body);}
  a{color:inherit;}
  header{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:12px 18px;
    border-bottom:1px solid var(--edge);background:linear-gradient(var(--void),rgba(11,14,20,.7));
    position:sticky;top:0;z-index:10;backdrop-filter:blur(6px);}
  header h1{font:700 17px/1 var(--disp);margin:0;letter-spacing:.4px;}
  header h1 .m{color:var(--dim);font:500 12px var(--body);}
  header .sp{flex:1;}
  label.lab{color:var(--dim);font:12px var(--mono);}
  select,button{background:var(--surface);color:var(--ink);border:1px solid var(--edge);
    border-radius:7px;padding:6px 11px;font:13px var(--body);cursor:pointer;}
  select:focus,button:hover{border-color:var(--cmp);outline:none;}
  button.go{background:linear-gradient(#10402e,#0c2c20);border-color:var(--closedai);color:#9af5cd;font-weight:600;}
  .wrap{display:grid;grid-template-columns:1fr 330px;gap:16px;padding:16px 18px;max-width:1280px;margin:0 auto;}
  .arena{display:flex;flex-direction:column;gap:12px;}
  /* seats */
  .seat{position:relative;background:var(--surface);border:1px solid var(--edge);border-radius:14px;
    padding:12px 14px;overflow:hidden;}
  .seat::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.10;
    background:linear-gradient(var(--grad-dir,90deg), var(--fh) 0%, transparent 42%);}
  .seat.active{border-color:var(--fh);box-shadow:0 0 0 1px var(--fh) inset, 0 0 26px -8px var(--fh);}
  .ceo{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
  .ceo .avatar{width:54px;height:68px;border-radius:9px;border:2px solid var(--fh);object-fit:cover;
    background:#070d0a;flex:none;box-shadow:0 4px 14px rgba(0,0,0,.5);}
  .ceo .who{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .ceo .nm{font:700 15px var(--disp);color:var(--fh);display:flex;align-items:center;gap:7px;}
  .ceo .nm .seatTag{font:700 10px var(--mono);color:var(--void);background:var(--fh);border-radius:4px;padding:1px 5px;}
  .stats{display:flex;gap:6px;flex-wrap:wrap;}
  .stat{background:#0c1118;border:1px solid var(--edge);border-radius:20px;padding:2px 9px;font:12px var(--mono);color:var(--dim);display:flex;align-items:center;gap:4px;}
  .stat b{font-weight:700;}
  .stat.val b{color:var(--val);} .stat.safe b{color:var(--safe);} .stat.cmp b{color:var(--cmp);}
  .ceo .power{margin-left:auto;width:48px;height:48px;border-radius:50%;flex:none;
    box-shadow:0 3px 12px rgba(0,0,0,.6);cursor:help;}
  .lbl{color:var(--dim);font:11px var(--mono);text-transform:uppercase;letter-spacing:.8px;margin:10px 0 5px;position:relative;z-index:1;}
  .row{display:flex;gap:8px;flex-wrap:wrap;min-height:34px;position:relative;z-index:1;}
  .row.hand{opacity:.92;}
  /* board token — faction-framed card with art (§5 board token) */
  .tok{position:relative;width:94px;height:118px;border-radius:9px;overflow:hidden;
    background:var(--surface);border:2px solid var(--fh);box-shadow:0 4px 14px rgba(0,0,0,.5);
    display:flex;flex-direction:column;}
  .tok .art{height:66px;background:#070d0a center/cover no-repeat;border-bottom:1px solid var(--edge);}
  .tok .noart{height:66px;display:flex;align-items:center;justify-content:center;color:var(--dim);font:9px var(--mono);background:linear-gradient(160deg,#0d141c,#0a0f16);text-align:center;padding:4px;}
  .tok .cn{font:600 10px/1.1 var(--disp);padding:4px 5px 2px;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tok .kw{font:8px var(--mono);color:var(--dim);padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tok .pips{margin-top:auto;display:flex;justify-content:space-between;padding:3px 5px;}
  .tok .pips .p{font:700 12px var(--mono);display:flex;align-items:center;gap:2px;}
  .tok .pips .atk{color:var(--perf);} .tok .pips .hp{color:var(--rel);}
  .tok.shared{border-style:dashed;border-color:#6E7681;}
  .tok .glyph{position:absolute;top:3px;right:4px;font:9px var(--mono);background:rgba(11,14,20,.78);
    border:1px solid var(--fh);border-radius:10px;padding:0 5px;color:var(--fh);}
  /* hand chip (smaller, with art thumb) */
  .hchip{display:flex;align-items:center;gap:6px;background:#0c1118;border:1px solid var(--edge);
    border-radius:7px;padding:3px 8px 3px 3px;font:11px var(--body);}
  .hchip .thumb{width:30px;height:22px;border-radius:4px;background:#070d0a center/cover no-repeat;border:1px solid var(--fh);flex:none;}
  .empty{color:var(--dim);font:12px var(--body);font-style:italic;}
  /* mid + actions */
  .mid{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--dim);font:12px var(--mono);}
  .mid .turn{color:var(--val);font-weight:700;}
  .acts{background:#0c1118;border:1px solid var(--edge);border-radius:10px;padding:9px 12px;min-height:26px;}
  .acts .who{font:700 12px var(--mono);}
  .acts .rationale{color:var(--val);font-style:italic;}
  .acts .actlist{margin-top:5px;color:var(--ink);font:12px var(--mono);}
  .controls{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
  input[type=range]{flex:1;accent-color:var(--val);}
  .banner{display:none;text-align:center;padding:10px;border-radius:11px;font:700 15px var(--disp);
    background:#12241a;border:1px solid var(--rel);color:#aef0c5;}
  .banner.show{display:block;}
  /* side log */
  .side{background:var(--surface);border:1px solid var(--edge);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;min-height:220px;}
  .side h3{margin:0 0 8px;font:11px var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--dim);}
  #log{flex:1;overflow:auto;max-height:64vh;}
  #log .e{padding:5px 0;border-bottom:1px solid #1a212b;cursor:pointer;}
  #log .e:hover{background:#0e141d;}
  #log .e .t{font:700 11px var(--mono);} #log .e .r{color:var(--val);font-style:italic;font:11px var(--mono);}
  .muted{color:var(--dim);font-size:12px;}
  @media(max-width:880px){.wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1>⚔ AI Card Battle <span class="m">— spectator · the datacenter colosseum</span></h1>
  <span class="sp"></span>
  <label class="lab">A <select id="selA"></select></label>
  <label class="lab">B <select id="selB"></select></label>
  <button id="run" class="go">New match ▶</button>
  <a href="/play"><button title="Play a live human-vs-human match">⚔ Play PvP</button></a>
  <a href="art/background/background.html" target="_blank"><button title="Open the interactive colosseum">▦ Colosseum</button></a>
  <a href="art/gallery.html" target="_blank"><button title="Browse all the art">🖼 Gallery</button></a>
</header>

<div class="wrap">
  <div class="arena">
    <div class="banner" id="banner"></div>
    <div class="seat" id="seatB"></div>
    <div class="mid"><span class="turn" id="turnLabel">—</span></div>
    <div class="acts" id="acts"></div>
    <div class="seat" id="seatA"></div>
    <div class="controls">
      <button id="prev">◀ Prev</button>
      <button id="next">Next ▶</button>
      <button id="auto">⏵ Auto</button>
      <input type="range" id="slider" min="0" max="0" value="0" />
      <span class="muted" id="counter">0 / 0</span>
    </div>
  </div>
  <div class="side">
    <h3>// match telemetry</h3>
    <div id="log"></div>
  </div>
</div>

<script>
const FACTIONS=[["closedai","ClosedAI"],["anthrabbit","Anthrabbit"],["googlitch","Googlitch"],["shallowseek","ShallowSeek"]];
const HUE={closedai:"#19C37D",anthrabbit:"#A07CFF",googlitch:"#4D8DF0",shallowseek:"#FF8A3D"};
const SKILL={closedai:"skill_hype_ping",anthrabbit:"skill_realign",googlitch:"skill_index_scry",shallowseek:"skill_spin_up"};
const KW_GLYPH={"Guardrail":"🛡","Ship It":"🚀","Hype":"📈","Glitch":"▓","Stealth Mode":"👁","Launch Day":"☀","Failover":"♻","Overclock":"🔥","Monetize":"$","On Deploy":"⚙","On Sunset":"🌇","Scaling Laws":"∑","Open Source":"⛓"};
const $=(id)=>document.getElementById(id);
for(const [k,n] of FACTIONS){for(const s of [$("selA"),$("selB")]){const o=document.createElement("option");o.value=k;o.textContent=n;s.appendChild(o);}}
$("selA").value="closedai"; $("selB").value="anthrabbit";

let R=null,i=0,timer=null,NAME2ID={};

// build a name→cardId index from the art manifest (board ids come direct; hand uses names)
fetch("art/MANIFEST.json").then(r=>r.json()).then(m=>{
  for(const c of m.cards) NAME2ID[c.name]=c.id;
}).catch(()=>{});

function artFile(c){ const id=(c&&c.id)||(c&&NAME2ID[c.name]); return id?`art/cards/${id}.svg`:null; }
function kwGlyph(kw){ if(!kw||!kw.length) return ""; const g=KW_GLYPH[kw[0]]; return g||""; }

function cardEl(c, fh, shared){
  const d=document.createElement("div"); d.className="tok"+(shared?" shared":"");
  d.style.setProperty("--fh", shared?"#6E7681":fh);
  const art=artFile(c);
  const g=kwGlyph(c.kw);
  const kw=(c.kw&&c.kw.length)?c.kw.join(" · "):"";
  d.innerHTML=`
    ${art?`<div class="art" style="background-image:url('${art}')"></div>`:`<div class="noart">${c.name}</div>`}
    ${g?`<span class="glyph">${g}</span>`:""}
    <div class="cn">${c.name}</div>
    ${kw?`<div class="kw">${kw}</div>`:""}
    <div class="pips"><span class="p atk">⚔ ${c.atk}</span><span class="p hp">🛡 ${c.hp}</span></div>`;
  return d;
}

function renderSeat(elId, seatKey, snap, faction, sharedRow, active){
  const el=$(elId); const fh=HUE[faction]||"#2A323D";
  el.className="seat"+(active?" active":"");
  el.style.setProperty("--fh",fh);
  el.style.setProperty("--grad-dir", seatKey==="A"?"90deg":"270deg");
  const v=snap.valuation,a=snap.armor;
  const compName=FACTIONS.find(f=>f[0]===faction)?.[1]||seatKey;
  el.innerHTML="";
  const ceo=document.createElement("div"); ceo.className="ceo";
  ceo.innerHTML=`
    <img class="avatar" src="art/heroes/ceo_${faction}.svg" alt="${compName} CEO" onerror="this.style.display='none'"/>
    <div class="who">
      <div class="nm"><span class="seatTag">${seatKey}</span>${compName}</div>
      <div class="stats">
        <span class="stat val">💰 <b>${v}</b> Valuation</span>
        ${a>0?`<span class="stat safe">🛡 <b>+${a}</b> Safety</span>`:""}
        <span class="stat cmp">⚡ <b>${snap.maxCompute}</b> Compute</span>
        <span class="stat">🂠 ${snap.handCount} · 📚 ${snap.deckCount}</span>
      </div>
    </div>
    <img class="power" src="art/skills/${SKILL[faction]}.svg" alt="founder move" title="Founder Move" onerror="this.style.display='none'"/>`;
  el.appendChild(ceo);
  const bl=document.createElement("div"); bl.className="lbl"; bl.textContent="▸ Data center"; el.appendChild(bl);
  const board=document.createElement("div"); board.className="row";
  for(const c of snap.board) board.appendChild(cardEl(c,fh,false));
  for(const c of (sharedRow||[])) board.appendChild(cardEl({id:c.id,name:c.name,atk:c.atk,hp:c.hp,kw:["Open Source"]},fh,true));
  if(!snap.board.length && !(sharedRow||[]).length) board.innerHTML='<span class="empty">— empty —</span>';
  el.appendChild(board);
  const hl=document.createElement("div"); hl.className="lbl"; hl.textContent="▸ Hand (open information)"; el.appendChild(hl);
  const hand=document.createElement("div"); hand.className="row hand";
  for(const n of snap.hand){
    const id=NAME2ID[n]; const c=document.createElement("div"); c.className="hchip";
    c.innerHTML=`${id?`<span class="thumb" style="background-image:url('art/cards/${id}.svg');--fh:${fh}"></span>`:""}<span>${n}</span>`;
    c.style.setProperty("--fh",fh); hand.appendChild(c);
  }
  if(!snap.hand.length) hand.innerHTML='<span class="empty">—</span>';
  el.appendChild(hand);
}

function render(){
  if(!R) return;
  const t=R.turns[i];
  renderSeat("seatB","B",t.B,R.bKey,t.shared,t.seat==="B");
  renderSeat("seatA","A",t.A,R.aKey,null,t.seat==="A");
  $("turnLabel").textContent=`TURN ${t.turnNumber} — ${t.seat} · ${t.company}`;
  const fh=HUE[t.seat==="A"?R.aKey:R.bKey]||"#F4C04C";
  $("acts").innerHTML=`<span class="who" style="color:${fh}">${t.seat} ${t.company}:</span> <span class="rationale">“${t.rationale||""}”</span><div class="actlist">`+t.actions.map(a=>`• ${a}`).join(" &nbsp; ")+`</div>`;
  $("slider").value=i; $("counter").textContent=`${i+1} / ${R.turns.length}`;
  const b=$("banner");
  if(i===R.turns.length-1 && R.result){ b.className="banner show"; const w=R.result.winner; b.textContent=w?`🏆 ${w==="A"?R.a:R.b} wins by ${R.result.reason}`:`Draw (${R.result.reason})`; }
  else b.className="banner";
}
function rebuildLog(){
  const log=$("log"); log.innerHTML="";
  R.turns.forEach((t,idx)=>{ const e=document.createElement("div"); e.className="e";
    const fh=HUE[t.seat==="A"?R.aKey:R.bKey]||"#8B97A6";
    e.innerHTML=`<span class="t" style="color:${fh}">T${t.turnNumber} ${t.seat}</span> <span class="r">“${t.rationale||""}”</span><br><span class="muted">${t.actions.join(", ")}</span>`;
    e.onclick=()=>{i=idx;render();}; log.appendChild(e); });
}
function stop(){ if(timer){clearInterval(timer);timer=null;$("auto").textContent="⏵ Auto";} }
async function newMatch(){
  stop(); $("run").disabled=true; $("run").textContent="…";
  const a=$("selA").value,b=$("selB").value;
  R=await (await fetch(`/demo?a=${a}&b=${b}`)).json();
  if(!R.aKey) R.aKey=a; if(!R.bKey) R.bKey=b;
  i=0; $("slider").max=R.turns.length-1;
  rebuildLog(); render();
  $("run").disabled=false; $("run").textContent="New match ▶";
}
$("run").onclick=newMatch;
$("prev").onclick=()=>{ stop(); if(i>0){i--;render();} };
$("next").onclick=()=>{ stop(); if(i<R.turns.length-1){i++;render();} };
$("slider").oninput=(e)=>{ stop(); i=+e.target.value; render(); };
$("auto").onclick=()=>{ if(timer){stop();return;} $("auto").textContent="⏸ Pause";
  timer=setInterval(()=>{ if(i<R.turns.length-1){i++;render();} else stop(); },1000); };
newMatch();
</script>
</body>
</html>
